name: E2E Tests

on:
  push:
    branches:
      - main
      - feature/**
      - fix/**
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      grep:
        description: "Tag expression to run (e.g. @smoke, @regression, @desktop)"
        required: false
        default: "@regression"

permissions:
  contents: write   # required by peaceiris/actions-gh-pages to push to gh-pages branch

jobs:
  playwright-tests:
    name: Playwright tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Checkout previous Allure report (for history/trend)
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: previous-report

      - name: Run Playwright tests
        run: npx playwright test --grep "${{ github.event.inputs.grep || '@regression' }}"

      - name: Restore Allure history for trend graphs
        if: always()
        run: |
          mkdir -p allure-results/history
          if [ -d previous-report/history ]; then
            cp -r previous-report/history/. allure-results/history/
          fi

      - name: Write Allure environment & executor info
        if: always()
        run: |
          cat > allure-results/environment.properties << 'EOF'
          Base.URL=https://www.dulux.co.uk
          Browsers=Chromium (desktop-chrome 1920x1080, mobile-chrome Pixel 7 emulation)
          OS=${{ runner.os }}
          Branch=${{ github.ref_name }}
          Commit=${{ github.sha }}
          EOF

          cat > allure-results/executor.json << EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "buildOrder": ${{ github.run_number }},
            "buildName": "Run #${{ github.run_number }}",
            "buildUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportUrl": "https://magdau.github.io/playwright-ts-dulux/",
            "reportName": "Allure Report"
          }
          EOF

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Generate Allure report
        if: always()
        run: npm run allure:generate

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 7

      - name: Deploy Allure report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages
          commit_message: "ci: publish Allure report [skip ci]"